<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      width: 340px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 18px;
      background: #090d16;
      color: #f8fafc;
      box-sizing: border-box;
    }
    h3 {
      margin-top: 0;
      color: #8b5cf6;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tabs {
      display: flex;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .tab:hover {
      color: #f1f5f9;
    }
    .tab.active {
      background: #8b5cf6;
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .status-card {
      font-size: 11px;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .status-item:last-child {
      margin-bottom: 0;
    }
    .label {
      color: #94a3b8;
      font-weight: 500;
    }
    .value {
      font-weight: 600;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge.online {
      background: rgba(6, 95, 70, 0.3);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }
    .badge.offline {
      background: rgba(127, 29, 29, 0.3);
      color: #fca5a5;
      border: 1px solid rgba(252, 165, 165, 0.2);
    }
    .badge.running {
      background: rgba(217, 119, 6, 0.3);
      color: #fde047;
      border: 1px solid rgba(253, 224, 71, 0.2);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 11px;
      color: white;
      font-size: 11px;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: #8b5cf6;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25);
    }
    .form-row {
      display: flex;
      gap: 10px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 11px;
    }
    .checkbox-container input {
      cursor: pointer;
      width: 14px;
      height: 14px;
    }
    .checkbox-container label {
      cursor: pointer;
      color: #94a3b8;
      font-weight: 500;
      user-select: none;
    }
    button {
      width: 100%;
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s ease;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    button:hover {
      background: #7c3aed;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    .btn-secondary {
      background: rgba(71, 85, 105, 0.2);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .btn-secondary:hover {
      background: rgba(71, 85, 105, 0.35);
    }
    .btn-success {
      background: #059669;
    }
    .btn-success:hover {
      background: #047857;
    }
    .btn-danger {
      background: #dc2626;
    }
    .btn-danger:hover {
      background: #b91c1c;
    }
    .info-text {
      font-size: 10px;
      color: #475569;
      text-align: center;
      line-height: 1.4;
      margin-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 10px;
    }
    #log-view-container {
      margin-top: 12px;
      background: #030712;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px;
    }
    .log-title {
      font-size: 9px;
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    #log-view {
      max-height: 110px;
      overflow-y: auto;
      color: #a78bfa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-all;
      height: 90px;
    }
    /* Estilização Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h3>📘 System Documenter</h3>
  
  <div class="status-card">
    <div class="status-item">
      <span class="label">Servidor Local:</span>
      <span id="server-status" class="badge offline">Verificando...</span>
    </div>
    <div class="status-item" id="audit-status-row" style="display: none;">
      <span class="label">Mapeamento:</span>
      <span id="audit-status" class="badge running">Executando</span>
    </div>
    <button id="btn-stop" class="btn-danger" style="display: none; margin-top: 10px; font-size: 11px; padding: 6px 12px; margin-bottom: 0;">
      🛑 Encerrar Execução Ativa
    </button>
  </div>

  <div class="tabs">
    <div class="tab active" data-target="tab-standard">Mapeamento Padrão</div>
    <div class="tab" data-target="tab-dynamic">Mapeamento Dinâmico</div>
  </div>

  <!-- ABA: PADRÃO -->
  <div id="tab-standard" class="tab-content active">
    <div class="form-group">
      <label for="select-system">Selecionar Sistema Configurado</label>
      <select id="select-system" class="form-control">
        <option value="alunopresente">System Documenter - Aluno Presente</option>
      </select>
    </div>

    <button id="btn-run" class="btn-success" disabled style="margin-top: 10px;">
      🚀 Iniciar Mapeamento Geral
    </button>
    
    <button id="btn-run-current" class="btn-secondary" disabled>
      🎯 Mapear Apenas Tela Atual
    </button>
  </div>

  <!-- ABA: DINÂMICA -->
  <div id="tab-dynamic" class="tab-content">
    <div class="form-group">
      <label for="input-url">URL Base do Sistema</label>
      <input type="url" id="input-url" class="form-control" placeholder="https://exemplo.com.br" required>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label for="input-email">Usuário/E-mail (Login)</label>
        <input type="text" id="input-email" class="form-control" placeholder="usuario@exemplo.com">
      </div>
      <div class="form-group">
        <label for="input-password">Senha</label>
        <input type="password" id="input-password" class="form-control" placeholder="senha123">
      </div>
    </div>
    
    <div class="form-group">
      <label for="input-loginpath">Caminho do Login (Opcional)</label>
      <input type="text" id="input-loginpath" class="form-control" placeholder="/login" value="/login">
    </div>

    <button id="btn-run-dynamic" disabled style="margin-top: 10px;">
      ⚡ Iniciar Mapeamento Dinâmico
    </button>
  </div>

  <!-- BOTÃO COMUM: DASHBOARD -->
  <button id="btn-dashboard" class="btn-secondary" style="margin-top: 8px;">
    🖥️ Abrir Documenter Dashboard
  </button>

  <!-- LOGS VIEW -->
  <div id="log-view-container" style="display: none;">
    <div class="log-title">📝 PROGRESSO EM TEMPO REAL:</div>
    <div id="log-view"></div>
  </div>

  <div class="info-text">
    O servidor local precisa estar ativo na porta 3001:<br>
    <code>npm run server</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
